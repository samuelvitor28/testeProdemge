<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <title>Teste Prodemge</title>
    </head>

    <body>
        <div id="titulo-projeto">
            <h1 class="m-3">
                Teste Prode<span style="color: red;">mg</span>e
            </h1>
        </div>
        
        <form class="row g-3 needs-validation" style="margin-left: 20px;" novalidate>

            <!--Serviços-->
            <div class="col-md-2 text-center">
                <label for="servicos" class="form-label">Serviço:</label>
                <select class="form-select" id="servicos" required>
                    <option selected disabled value="">Selecione...</option>
                    <option>Serviço 1</option>
                    <option>Serviço 2</option>
                    <option>Serviço 3</option>
                    <option>Serviço 4</option>
                </select>
                <div class="invalid-feedback">
                    Favor selecionar um serviço válido.
                </div>
            </div>

            <!--Data de Postagem-->
            <div class="col-md-2 text-center" >
                <label for="dataPostagem" class="form-label">Data Postagem:</label>
                <input type="date" class="form-control" id="dataPostagem" required>
                <div class="invalid-feedback">
                    Favor informar uma data válida.
                </div>
            </div>
            
            <!--Quantidade-->
            <div class="col-md-2 text-center">
                <label for="quantidade" class="form-label">Quantidade:</label>
                <input type="number" class="form-control" id="quantidade" min="1" max="100" required>
                <div class="invalid-feedback">
                    Favor informar uma quantidade válida.
                </div>
            </div>

            <!--JOB-->
            <div class="col-md-2 text-center">
                <label for="job" class="form-label">JOB:</label>
                <input type="number" class="form-control" id="job" min=1 max ="9999" required>
                <div class="invalid-feedback">
                    Favor informar um JOB válido.
                </div>
            </div>

            <!--OCR-->
            <div class="col-md-3 text-center">
                <label for="ocr" class="form-label">Nº Recibo, OCR ou Remessa:</label>
                <input type="text" class="form-control" id="ocr" maxlength="9" required>
                <div class="invalid-feedback">
                    Favor informar um OCR válido.
                </div>
            </div>

            <!--Quebra de linha para a data de lançamento e os botões-->
            <br>
            <div class="border-bottom border-gray"> </div>
            <br>

            <!--Data Lançamento-->
            <div class="col-md-3">
                <label for="dataLancamento" class="form-label">Data Lançamento:</label>
                <input type="date" class="form-control" id="dataLancamento" required>
                <div class="invalid-feedback">
                    Favor informar uma data válida.
                </div>
            </div>
            
            <!--Botões-->
            <div class="col-12">
                <button type="button" id="btnSalvar" class="btn btn-primary">Salvar</button>
                <button type="button" id="btnCancelar" class="btn btn-danger">Cancelar</button>
            </div>

        </form>
    </body>

    <!--Lógica botão Salvar, valida se as informações nos inputs são válidas, se sim gera um alert que confirma a inserção de dados, se não gera o invalid-feedback nos campos que estão irregulares.-->
    <script> document.getElementById("btnSalvar").addEventListener("click", ()=>{ 
        const form = document.querySelector("form"); 
            if (form.checkValidity()){    
                alert("Dados salvos com sucesso!");
                form.reset();
            } 
            else{ 
                form.classList.add("was-validated"); 
            }            
        }); 
    </script>
    
    <!--Lógica botão Cancelar, limpa os dados já inseridos nos inputs.-->
    <script>
        document.getElementById("btnCancelar").addEventListener("click", ()=>{
            const form = document.querySelector("form");
            form.reset();
            form.classList.remove("was-validated");
        });
    </script>

</html>
